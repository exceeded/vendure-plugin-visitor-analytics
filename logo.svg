<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HULO Visitor Analytics">
  <title>HULO Visitor Analytics</title>
  <!-- HULO frame. -->
  <rect width="64" height="64" rx="14" fill="#0f1419"/>
  <!-- Bar chart — four rising bars in white. Left-most is the
       shortest; each column steps up so growth reads at any size.
       Bars sit on an implied baseline at y=48. -->
  <rect x="14" y="34" width="7" height="14" rx="1.5" fill="#ffffff"/>
  <rect x="24" y="28" width="7" height="20" rx="1.5" fill="#ffffff"/>
  <rect x="34" y="22" width="7" height="26" rx="1.5" fill="#ffffff"/>
  <rect x="44" y="16" width="7" height="32" rx="1.5" fill="#ffffff"/>
  <!-- Trend line — amber diagonal that connects the bar tops with
       a small end-point dot. This is the "analytics" signal — it
       turns "bar chart" into "line-of-improvement" and the amber
       colour ties the mark to the HULO brand. -->
  <polyline points="17.5,34 27.5,28 37.5,22 47.5,16"
            fill="none" stroke="#f59e0b" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="47.5" cy="16" r="2.5" fill="#f59e0b"/>
</svg>
