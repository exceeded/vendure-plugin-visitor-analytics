version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Europe/London'
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      vendure:
        patterns:
          - "@vendure/*"
      huloglobal:
        patterns:
          - "@huloglobal/*"
